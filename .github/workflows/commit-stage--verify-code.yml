name: Commit Stage - Verify Code

on: workflow_call

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Packages
        run: npm ci --force

      - name: Run Format Check
        run: npm run format:check

      - name: Run Lint
        run: npm run lint

      - name: Run TS Check
        run: npm run tscheck

      - name: Run Tests
        run: npm run test
